name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:4400/api/v1
          NEXT_SERVER_BASE_URL: http://localhost:4400/api/v1
